name: Android Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Check Firestore queue
        run: |
          echo "Checking queue..."
