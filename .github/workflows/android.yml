name: Mzansi AI Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Build APK
      run: |
        echo "Building project"
        mkdir build
        echo "Mzansi Build" > build/app.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk
        path: build/app.apk
